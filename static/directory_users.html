<html>

<head>
    <link rel="stylesheet" href="./static/stylesheets/style.css" />
</head>

<body class="container_success">
    <div class="logged_in_nav">
        <div class="flex">
            <div>
                <img src="./static/images/workos_logo_new.png" alt="workos logo" />
            </div>
        </div>
        <div class="flex">
            <a href="https://workos.com/docs" target="_blank">
                <button class="button nav-item">Documentation</button>
            </a>
            <a href="https://workos.com/docs/reference" target="_blank">
                <button class="button nav-item">API Reference</button>
            </a>
            <a href="https://workos.com/blog" target="_blank">
                <button class="button nav-item blog-nav-button">Blog</button>
            </a>
            <a href="https://workos.com/" target="_blank">
                <button class="button button-outline">WorkOS</button>
            </a>
        </div>
    </div>

    <div class="flex">
        <div class="logged_in_div_right">
            <div class="flex_column">
                <div class="flex width-941px space-between">
                    <div>
                        <p>Directory Users</p>
                    </div>
                    <div>
                        <p>Signed in as {{ .FirstName }} {{ .LastName }}</p>
                    </div>
                    <div>
                        <a href="/logged_in">
                            <button class="button button-outline">Back</button>
                        </a>
                    </div>
                </div>

                <div class="card profile_card width-40vw">
                    <table class="directory-table">
                        <thead>
                            <tr>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>State</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{ range .Users }}
                            <tr>
                                <td>{{ .FirstName }}</td>
                                <td>{{ .LastName }}</td>
                                <td>{{ .State }}</td>
                            </tr>
                            {{ else }}
                            <tr>
                                <td colspan="3" class="directory-empty">No users found.</td>
                            </tr>
                            {{ end }}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
